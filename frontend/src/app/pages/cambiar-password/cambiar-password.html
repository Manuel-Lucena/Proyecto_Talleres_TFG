<div class="contenedor-login">
  <div class="card tarjeta-login border-0 overflow-hidden">
    <div class="row g-0">
      
      <div class="col-md-6 bg-white d-flex align-items-center">
        <div class="card-body p-4 p-lg-5">
          
          <div class="text-center mb-4">
            <h1 class="titulo-reset">Nueva Clave</h1>
            <p class="text-muted small">Restablece tu acceso a Aula Viva</p>
          </div>

          <div *ngIf="mensajeError" class="alert-error-custom animate-fade-in">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> 
            {{ mensajeError }}
          </div>

          <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label label-personalizada">NUEVA CONTRASEÑA</label>
              <div class="input-group custom-focus" 
                   [class.is-invalid]="resetForm.get('password')?.touched && resetForm.get('password')?.invalid">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input [type]="verPassword ? 'text' : 'password'" 
                       formControlName="password" 
                       class="form-control" 
                       placeholder="••••••••">
                <button type="button" class="btn-toggle-pass" (click)="verPassword = !verPassword" tabindex="-1">
                  <i class="bi" [ngClass]="verPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              <div class="error-validante" *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.errors?.['minlength']">
                Mínimo 6 caracteres.
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label label-personalizada">REPETIR CONTRASEÑA</label>
              <div class="input-group custom-focus"
                   [class.is-invalid]="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.invalid">
                <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                <input [type]="verPassword ? 'text' : 'password'" 
                       formControlName="confirmPassword" 
                       class="form-control" 
                       placeholder="••••••••">
              </div>
            </div>

            <button type="submit" class="btn btn-primary shadow-sm" [disabled]="loading || !token">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'ACTUALIZANDO...' : 'GUARDAR CAMBIOS' }}
            </button>

            <div class="divisor-footer">
              <a [routerLink]="['/login']" class="enlace-vuelta small text-decoration-none fw-bold">
                <i class="bi bi-arrow-left"></i> Volver al Login
              </a>
            </div>
          </form>
        </div>
      </div>

      <div class="col-md-6 d-none d-md-flex seccion-derecha-imagen align-items-center justify-content-center">
        <img src="icons/Logo.png" class="logo-sobre-imagen" alt="Logo Aula Viva">
      </div>

    </div>
  </div>
</div>
