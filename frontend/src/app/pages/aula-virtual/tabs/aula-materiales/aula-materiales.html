<div class="recursos-container fade-in">
  
  <div *ngIf="cargando" class="loading-wrapper">
    <div class="spinner-border" role="status"></div>
    <span>Cargando materiales...</span>
  </div>

  <div class="recursos-lista" *ngIf="!cargando">
    
    <article class="recurso-card" 
             *ngFor="let m of materiales" 
             (click)="verDetalle(m.id)">
      
      <div class="card-main">
        <div class="icon-container bg-azul">
          <i class="bi bi-file-earmark-text"></i>
        </div>

        <div class="text-box">
          <h3 class="titulo">{{ m.titulo }}</h3>
          <p class="resumen">{{ m.contenido }}</p>
        </div>
      </div>

      <div class="card-side">
        <div class="info-date">
          <i class="bi bi-calendar3"></i>
          <span>{{ m.fechaSubida | date:'dd MMM, yyyy' }}</span>
        </div>
        
        <div class="action-icon">
          <i class="bi bi-chevron-right"></i>
        </div>
      </div>

    </article>

    <div class="sin-datos" *ngIf="materiales.length === 0">
      <div class="empty-state-icon">
        <i class="bi bi-folder2-open"></i>
      </div>
      <h3>Biblioteca vacía</h3>
      <p>Aún no se han compartido archivos en este taller.</p>
    </div>

  </div>
</div>
