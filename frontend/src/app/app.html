<main id="main-content" class="app-content-wrapper" [class.modal-open]="modalActive" role="main">
  <router-outlet></router-outlet>
</main>

<div class="accessibility-container">
  <button class="accessibility-btn" aria-label="Abrir menú de opciones de accesibilidad" (click)="toggleAccessMenu()"
    type="button">
    <i class="bi" [ngClass]="showAccessMenu ? 'bi-x-lg' : 'bi-universal-access'"></i>
  </button>

  <div class="accessibility-panel" [class.show]="showAccessMenu">
    <div class="panel-header">
      <p class="panel-title">Accesibilidad</p>
    </div>

    <div class="panel-body">
      <div class="option-item mb-3">
        <label class="d-block mb-1">Contraste ({{contrastValue}}%)</label>
        <input type="range" class="form-range" min="50" max="150" step="10" (input)="updateContrast($event)"
          [value]="contrastValue">
      </div>

      <div class="option-item mb-3">
        <label class="d-block mb-1">Tipo de Daltonismo</label>
        <select class="form-select form-select-sm" (change)="setDaltonism($event)" [value]="currentDaltonism">
          <option value="none">Predeterminada</option>
          <option value="protanopia">Protanopia (Rojo)</option>
          <option value="deuteranopia">Deuteranopia (Verde)</option>
          <option value="tritanopia">Tritanopia (Azul)</option>
        </select>
      </div>

      <div class="option-item mb-3">
        <label class="d-block mb-2">Tamaño de letra</label>
        <div class="btn-group w-100">
          <button (click)="changeFontSize('small')" class="btn btn-outline-secondary btn-sm"
            [class.active]="currentFontSize === 'small'">A</button>
          <button (click)="changeFontSize('medium')" class="btn btn-outline-secondary btn-sm"
            [class.active]="currentFontSize === 'medium'">A+</button>
          <button (click)="changeFontSize('large')" class="btn btn-outline-secondary btn-sm"
            [class.active]="currentFontSize === 'large'">A++</button>
        </div>
      </div>

      <button class="reset-btn w-100" (click)="resetAll()">Restablecer todo</button>
    </div>
  </div>
</div>
