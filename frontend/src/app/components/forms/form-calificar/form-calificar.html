<div class="modal-overlay" (click)="cerrar.emit()">
  <div class="modal-body" (click)="$event.stopPropagation()">
    <button class="btn-close" (click)="cerrar.emit()">
      <i class="bi bi-x-lg"></i>
    </button>

    <div class="calificar-layout" *ngIf="entrega">
      <aside class="entrega-contexto">
        <header class="header-seccion">
          <span class="badge-alumno">Entrega del Alumno</span>
          <h2>Revisar Material</h2>
        </header>

        <div class="contenido-entrega">
          <div class="bloque-info">
            <label>Comentarios del alumno</label>
            <div class="texto-caja">
              {{ entrega.textoEntrega || 'El alumno no ha adjuntado comentarios adicionales.' }}
            </div>
          </div>

          <div class="bloque-info" *ngIf="archivosAlumno.length > 0">
            <label>Material adjunto ({{ archivosAlumno.length }})</label>
            <div class="grid-archivos">
              <div *ngFor="let a of archivosAlumno" (click)="descargarArchivo(a)" class="tarjeta-archivo" title="Descargar archivo">
                <i class="bi bi-file-earmark-arrow-down"></i>
                <div class="file-meta">
                  <span class="file-name">{{ a.nombre }}</span>
                  <span class="file-action">Clic para descargar</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section class="evaluacion-form">
        <header class="header-seccion">
          <span class="badge-profesor">Evaluación</span>
          <h2>Calificar Tarea</h2>
        </header>

        <form [formGroup]="form" (ngSubmit)="guardarNota()">
          <div class="campo-nota">
            <app-form-label 
              texto="Puntuación Final" 
              [requerido]="true" 
              ayuda="Escala de 0 a 10. Se permiten hasta dos decimales." 
              forId="calificacion">
            </app-form-label>
            
            <div class="input-nota-wrapper">
              <input 
                type="number" 
                id="calificacion" 
                formControlName="calificacion" 
                placeholder="0.00" 
                [class.is-invalid]="errorService.mostrarError(form, 'calificacion')">
              <span class="puntos-tag">/ 10</span>
            </div>

            <div class="error-container">
              <span *ngIf="errorService.mostrarError(form, 'calificacion')" class="error-message">
                {{ errorService.getErrorMessage(form, 'calificacion') }}
              </span>
            </div>
          </div>

          <div class="campo-feedback">
            <app-form-label 
              texto="Retroalimentación para el alumno" 
              ayuda="Escribe aquí tus observaciones para motivar al alumno." 
              forId="feedback">
            </app-form-label>
            <textarea 
              id="feedback" 
              formControlName="comentarioProfesor" 
              rows="6" 
              placeholder="Escribe aquí tus observaciones...">
            </textarea>
          </div>

          <div class="acciones-evaluacion">
            <button type="submit" class="btn-confirmar" [disabled]="form.invalid || cargando">
              <span *ngIf="!cargando">Publicar Calificación</span>
              <span *ngIf="cargando" class="spinner-border spinner-border-sm"></span>
            </button>
            <button type="button" (click)="cerrar.emit()" class="btn-link-cancelar">Volver sin guardar</button>
          </div>
        </form>
      </section>
    </div>
  </div>
</div>
