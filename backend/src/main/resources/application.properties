# ==========================================
# CONFIGURACIÓN DE LA APLICACIÓN
# ==========================================
spring.application.name=gestion-talleres
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ------------------------------------------
# CONFIGURACIÓN DE BASE DE DATOS (HÍBRIDA)
# ------------------------------------------
# En K8s usaremos el nombre del servicio (ej: mysql-service). En local, localhost.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:gestion_talleres}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ==========================================
# SEGURIDAD Y ARCHIVOS
# ==========================================
# La clave secreta se puede pasar por K8s Secret, si no, usa la de por defecto
jwt.secret=${JWT_SECRET:EstaEsMiClaveSecretaParaGestionDeTalleres2026}
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CONFIGURACIÓN DE RUTAS DE ALMACENAMIENTO
# ==========================================

# --- OPCIÓN 1: DESARROLLO LOCAL ---
app.storage.public-path=frontend/public
app.storage.protected-path=storage/protected

# --- OPCIÓN 2: KUBERNETES / PRODUCCIÓN ---
# app.storage.public-path=/app/data/public
# app.storage.protected-path=/app/data/protected

