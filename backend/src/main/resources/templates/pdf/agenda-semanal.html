<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 1.5cm; }
        body { 
            font-family: 'Helvetica', Arial, sans-serif; 
            color: #333; 
            line-height: 1.5;
        }
        .header { 
            text-align: center; 
            border-bottom: 3px solid #3498db; 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
        }
        .header h1 { margin: 0; color: #2c3e50; font-size: 24px; text-transform: uppercase; }
        
        .info-section { 
            background-color: #f8f9fa; 
            padding: 15px; 
            border: 1px solid #dee2e6; 
            margin-bottom: 20px; 
        }
        
        .main-table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        .main-table th { 
            background-color: #34495e; 
            color: white; 
            padding: 12px; 
            text-align: left; 
            border: 1px solid #2c3e50;
        }
        .main-table td { 
            padding: 10px; 
            border: 1px solid #dee2e6; 
        }
        .dia { font-weight: bold; color: #3498db; width: 20%; }
        .hora { width: 25%; }
        .taller { font-weight: bold; width: 55%; }

        .footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            text-align: center; 
            font-size: 10px; 
            color: #95a5a6; 
            border-top: 1px solid #eee; 
            padding-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Mi Agenda Semanal</h1>
    </div>

    <div class="info-section">
        <span th:text="${usuario.nombre + ' ' + usuario.apellidos}">Nombre</span><br/>
        <strong>DNI:</strong> <span th:text="${usuario.dni}">DNI</span>
    </div>

    <table class="main-table">
        <thead>
            <tr>
                <th>Día</th>
                <th>Horario</th>
                <th>Taller / Actividad</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${horarios}">
                <td class="dia" th:text="${h.diaSemana}">Lunes</td>
                <td class="hora">
                    <span th:text="${h.horaInicio}">00:00</span> - <span th:text="${h.horaFin}">00:00</span>
                </td>
                <td class="taller" th:text="${h.nombreTaller}">Nombre del Taller</td>
            </tr>
            <tr th:if="${horarios == null || #lists.isEmpty(horarios)}">
                <td colspan="3" style="text-align: center; padding: 20px; color: #7f8c8d;">
                    No tienes sesiones programadas en tu agenda.
                </td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Documento generado automáticamente por el sistema MLG Talleres.
    </div>

</body>
</html>
